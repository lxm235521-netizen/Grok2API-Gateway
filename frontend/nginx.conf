server {
    listen 80;
    server_name localhost;

    # 1. 解决大文件上传限制 (如带图请求)
    client_max_body_size 50M;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Token 接口
    location /token {
        proxy_pass http://backend:6006/token;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. 后端 API (增加流式支持)
    location /api {
        proxy_pass http://backend:6006/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 禁用缓存，支持 SSE
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # 4. 核心网关转发 (重点优化视频生成)
    location /proxy {
        proxy_pass http://backend:6006/proxy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 延长读取超时时间，防止视频生成中断
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # 必须禁用缓存以支持 SSE 流式返回
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # 5. 增加一个 /v1 的直接映射 (增强客户端兼容性)
    location /v1 {
        proxy_pass http://backend:6006/proxy/v1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }
}
